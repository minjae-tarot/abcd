<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

  body{
    font-family: Arial, sans-serif;
    background:#1e1e3f;
    color:white;
    text-align:center;
    padding:20px;
    margin:0;
  }

  h1{margin-bottom:10px;}

  button {
      width: 50px;        /* 버튼 가로 */
      height: 50px;       /* 버튼 세로 = 가로, 정사각형 */
      font-size: 10px;     /* 글자 크기 */
      margin: 30px;
      border: none;
      border-radius: 50%;  /* 완전 원형 */
      cursor: pointer;
      background: gold;
      display: inline-flex;      /* 글자 중앙 정렬 */
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3); /* 입체감 옵션 */
      transition: transform 0.2s ease;
  }

  button:hover {
      transform: scale(1.1);
  }

  #deck{
    display: grid;
    grid-template-columns: repeat(13, 75px);
    grid-gap: 10px 12px;
    justify-content: center;
    max-width: 1100px;
    margin: 20px auto;
  }

  .card{
    width: 70px;
    height: 105px;
    border-radius: 8px;
    cursor: pointer;
    object-fit: cover;
    border: 2px solid transparent;
    box-sizing: border-box;
    transition: transform 0.15s ease;
  }
  .card:hover:not(.selected){
    transform: scale(1.1);
    z-index: 10;
  }
  .selected{
    border-radius:50px;
    border-color: gold;
    cursor: default;
  }

  #resultArea{
    position: relative;
    width: 560px;
    height: 380px;
    margin: 100px auto;
    display: none;
    background: #2a2a4a;
    border-radius: 15px;
  }
  .result-card{
    position: absolute;
    width: 100px;
    height: 170px;
    object-fit: cover;
    border-radius: 8px;
  }

   #pos1 { top: 27%; left: 8%; }
   #pos2 { top: 27%; left: 40%; }
   #pos3 { top: 27%; left: 73%; }

  @media (max-width: 720px) {

    #deck {
      grid-template-columns: repeat(13, 1fr);  /* 👈 가로 6장 */
      grid-auto-rows: auto;
      grid-gap: 1px;
      max-width: 100%;
      padding: 0 5px;
    }

    .card {
      width: 100%;
      height: auto;
      aspect-ratio: 2 / 3;   /* 카드 비율 유지 */
    }

     body {
    overflow-x: hidden;   /* 가로 스크롤 제거 */
  }

  #resultArea {
    width: 90vw;          /* 화면 기준 */
    height: calc(95vw * 0.68);  /* 560:380 비율 유지 */
    margin: 50px auto;
    position: relative;
  }

  .result-card {
    width: 18vw;
    height: auto;
  }
   #pos1 { top: 27%; left: 8%; }
   #pos2 { top: 27%; left: 40%; }
   #pos3 { top: 27%; left: 73%; }
  }

</style>

</head>
<body>

<button id="shuffleBtn" onclick="shuffleDeck()"></button>

<div id="deck"></div>

<div id="resultArea">
  <img id="pos1" class="result-card">
  <img id="pos2" class="result-card">
  <img id="pos3" class="result-card">
</div>

<script>
  const deckDiv = document.getElementById("deck");
  const resultArea = document.getElementById("resultArea");
  const shuffleBtn = document.getElementById("shuffleBtn"); // 👈 버튼 요소 가져오기

  const backImage = "https://minjae-tarot.github.io/abcd/cards/joker.png";
  const baseURL = "https://minjae-tarot.github.io/abcd/cards/img(";
  const ext = ").jpg";
  
  let deckOrder = [];
  let selectedCards = [];
  const maxSelect = 3;

  function initDeck(){
    deckOrder = [];
    for(let i=1;i<=78;i++){
      deckOrder.push(i);
    }
    //renderDeck();
  }

 function renderDeck(){
    deckDiv.innerHTML = "";
    selectedCards = [];
    resultArea.style.display = "none";
    
    // 셔플 후 카드를 뿌릴 때 덱 영역은 보이게 유지
    deckDiv.style.display = "grid"; 

    deckOrder.forEach(num=>{
      const img = document.createElement("img");
      img.className = "card";
      img.src = backImage;
      img.dataset.num = num;
      img.addEventListener("click", () => selectCard(img));
      deckDiv.appendChild(img);
    });
  }

  function selectCard(img){
    if(selectedCards.length >= maxSelect) return;
    const num = img.dataset.num;
    if(selectedCards.includes(num)) return;

    selectedCards.push(num);
    img.classList.add("selected");
    img.style.visibility = "hidden"; 

    if(selectedCards.length === maxSelect){
      showResult();
    }
  }

  function showResult(){
    const posIds = ["pos1","pos2","pos3"];
    for(let i=0; i < maxSelect; i++){
      const cardImg = document.getElementById(posIds[i]);
      cardImg.src = baseURL + selectedCards[i] + ext;
    }
    
    deckDiv.style.display = "none";    // 덱 숨기기
    resultArea.style.display = "block"; // 결과 보이기
    shuffleBtn.style.display = "inline-flex"; // 👈 결과가 나오면 버튼 다시 보이기
    
    resultArea.scrollIntoView({behavior:"smooth"});
  }

  function resetResult(){
    const posIds = ["pos1","pos2","pos3"];

    posIds.forEach(id => {
      const cardImg = document.getElementById(id);
      cardImg.src = "";   // 결과 카드 이미지 제거
    });

    resultArea.style.display = "none";  // 결과 영역 숨김
  }

  function shuffleDeck(){
    shuffleBtn.style.display = "none"; 
    
    resetResult(); 
    for(let i=deckOrder.length -1; i>0; i--){
      const j = Math.floor(Math.random()*(i+1));
      [deckOrder[i], deckOrder[j]] = [deckOrder[j], deckOrder[i]];
    }
    renderDeck();
  }

  initDeck();

</script>

</body>
</html>
